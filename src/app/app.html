<div class="app-shell">
  <header class="app-header">
    <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-3">
      <div class="d-flex align-items-center gap-3">
        <div class="brand fs-4">Recipe Sharing Studio</div>
        @if (auth.isAdmin()) {
          <span class="pill-tag">Admin</span>
        }
        @if (auth.isChef()) {
          <span class="pill-tag">Chef</span>
        }
      </div>
      <div class="d-flex align-items-center gap-2">
        @if (!auth.session()) {
          <a class="btn btn-outline-dark btn-sm" routerLink="/login">Login</a>
          <a class="btn btn-accent btn-sm" routerLink="/register">Chef Register</a>
        } @else {
          @if (auth.isAdmin()) {
            <a class="btn btn-outline-dark btn-sm" routerLink="/admin">Admin Panel</a>
          }
          @if (auth.isChef()) {
            <a class="btn btn-outline-dark btn-sm" routerLink="/chef">Chef Hub</a>
          }
          <button class="btn btn-accent btn-sm" type="button" (click)="auth.logout()">Logout</button>
        }
      </div>
    </div>
  </header>

  <main class="flex-grow-1 py-4">
    <router-outlet></router-outlet>
  </main>
</div>
